components:
  securitySchemes:
    HueApplicationKey:
      type: apiKey
      in: header
      name: hue-application-key
  schemas:
    response:
      type: array
      minItems: 1
      maxItems: 1
      items:
        type: object
        properties:
          success:
            type: object
            properties:
              username:
                type: string
              clientkey:
                type: string
          error:
            type: object
            properties:
              type:
                type: integer
                example: 101
              address:
                type: string
              description:
                type: string
                example: link button bot pressed
    Error:
      type: object
      required:
        - description
      properties:
        description:
          type: string
          description: a human-readable explanation specific to this occurrence of the problem.
    ErrorResponse:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
    Resource:
      type: object
      description: Common resource properties
      required:
        - type
        - id
      properties:
        type:
          type: string
          description: Type of the supported resources
          example: light
        id:
          type: string
          description: Unique identifier representing a specific resource instance
          pattern: ^[0-9a-f]{8}-([0-9a-f]{4}-){3}[0-9a-f]{12}$
          example: 3883f8bf-30a3-445b-ac06-b047d50599df
        id_v1:
          type: string
          description: Clip v1 resource identifier
          pattern: ^(\/[a-z]{4,32}\/[0-9a-zA-Z-]{1,32})?$
          example: /lights/8
    ResourceIdentifier:
      type: object
      required:
        - rid
        - rtype
      properties:
        rid:
          type: string
          description: The unique id of the referenced resource
          pattern: ^[0-9a-f]{8}-([0-9a-f]{4}-){3}[0-9a-f]{12}$
          example: 42edd1f5-9538-4180-9ced-2d9e07f26d0f
        rtype:
          type: string
          description: The type of the referenced resource
          enum:
            - device
            - bridge_home
            - room
            - zone
            - light
            - button
            - relative_rotary
            - temperature
            - light_level
            - motion
            - camera_motion
            - entertainment
            - contact
            - tamper
            - grouped_light
            - device_power
            - zigbee_bridge_connectivity
            - zigbee_connectivity
            - zgp_connectivity
            - bridge
            - zigbee_device_discovery
            - homekit
            - matter
            - matter_fabric
            - scene
            - entertainment_configuration
            - public_image
            - auth_v1
            - behavior_script
            - behavior_instance
            - geofence
            - geofence_client
            - geolocation
            - smart_scene
            - grouped_motion
            - grouped_light_level
    ResourceOwned:
      type: object
      description: Common resource properties including the owner
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required:
            - owner
          properties:
            owner:
              $ref: '#/components/schemas/ResourceIdentifier'
    ResourceGet:
      type: object
      description: |
        The API is actually returning the full resource description depending on the type, not just the fields that are
        documented below.
      allOf:
        - $ref: '#/components/schemas/ResourceOwned'
        - type: object
          properties:
            type:
              type: string
              description: Type of the supported resources
              example: light
              enum:
                - device
                - bridge_home
                - room
                - zone
                - light
                - button
                - relative_rotary
                - temperature
                - light_level
                - motion
                - camera_motion
                - entertainment
                - contact
                - tamper
                - grouped_light
                - device_power
                - zigbee_bridge_connectivity
                - zigbee_connectivity
                - zgp_connectivity
                - bridge
                - zigbee_device_discovery
                - homekit
                - matter
                - matter_fabric
                - scene
                - entertainment_configuration
                - public_image
                - auth_v1
                - behavior_script
                - behavior_instance
                - geofence
                - geofence_client
                - geolocation
                - smart_scene
                - grouped_motion
                - grouped_light_level
    ApiResponse:
      type: object
      required:
        - errors
        - data
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
        data:
          type: array
          items:
            type: object
    ProductArchetype:
      type: string
      description: The default archetype given by manufacturer. Can be changed by user.
      example: hue_go
      enum:
        - bridge_v2
        - unknown_archetype
        - classic_bulb
        - sultan_bulb
        - flood_bulb
        - spot_bulb
        - candle_bulb
        - luster_bulb
